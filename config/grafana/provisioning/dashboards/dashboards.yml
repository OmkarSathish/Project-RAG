# Grafana Dashboard Provisioning Configuration

apiVersion: 1

providers:
  - name: 'RAG System Dashboards'
    orgId: 1
    folder: 'RAG Monitoring'
    folderUid: 'rag-monitoring'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
